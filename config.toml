# GAME NIGHT server config. CLI flags override these (python3 server/main.py --help).

port = 8000

# Whoever types this at the name screen becomes the Host (start rounds, change
# settings, kick). Change it! If left empty, a random one is printed each run.
host_password = "change-me"

# Optional gate for everyone else. "" means anyone with the URL can join.
join_password = ""

# Auto-launch a Cloudflare quick tunnel at startup so remote friends get one
# shareable https URL with nothing to install on their end (needs the
# `cloudflared` binary on PATH — same effect as the --tunnel CLI flag).
tunnel = false

max_players = 12
